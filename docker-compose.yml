services:
  postgres:
    image: postgres:16-alpine
    container_name: xeno-postgres
    environment:
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno
      POSTGRES_DB: xeno
    ports:
      - "5432:5432"
    volumes:
      - xeno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xeno"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xeno-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xeno_pgdata:
